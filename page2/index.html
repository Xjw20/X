<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近代史知识问答</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <h1>近代史知识问答</h1>
            <p class="start-desc">随机抽取20道题目，普通题1分 难题4分</p>
            <div class="start-buttons">
                <button class="btn-primary" id="startBtn">开始答题</button>
                <button class="btn-secondary hidden" id="continueBtn">继续答题</button>
                <button class="btn-secondary" id="historyBtn">历史记录</button>
                <button class="btn-secondary" onclick="location.href='https://Xjw20.github.io/X/'">返回首页</button>
            </div>
        </div>
        <div class="game-body hidden" id="gameBody">
            <header class="game-header">
                <div class="game-stats">
                    <span class="score">得分: <span id="score">0</span></span>
                    <span class="progress">第 <span id="current">1</span> / 20 题</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </header>
            <main class="game-main">
                <div class="question-tag" id="questionTag"></div>
                <h2 class="question-text" id="questionText"></h2>
                <div class="options-list" id="optionsList"></div>
            </main>
            <footer class="game-footer">
                <button class="btn-prev" id="prevBtn" disabled>上一题</button>
                <button class="btn-next" id="nextBtn" disabled>下一题</button>
            </footer>
        </div>
        <div class="result-modal hidden" id="resultModal">
            <div class="result-content">
                <h2>答题结束</h2>
                <p class="final-score">最终得分: <span id="finalScore">0</span></p>
                <div class="result-buttons">
                    <button class="btn-primary" id="restartBtn">再来一次</button>
                    <button class="btn-secondary" id="backHomeBtn">回到首页</button>
                </div>
            </div>
        </div>
        <div class="history-modal hidden" id="historyModal">
            <div class="history-content">
                <h2>答题记录</h2>
                <div class="history-list" id="historyList"></div>
                <div class="history-buttons">
                    <button class="btn-secondary" id="clearHistoryBtn">清空记录</button>
                    <button class="btn-primary" id="closeHistoryBtn">关闭</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
