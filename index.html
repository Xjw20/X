<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        window.__getTimePeriod = function(hour) {
            if (hour < 3) return 'midnight';
            if (hour < 6) return 'lateNight';
            if (hour < 11) return 'morning';
            if (hour < 13) return 'noon';
            if (hour < 18) return 'afternoon';
            if (hour < 19) return 'evening';
            return 'night';
        };

        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }

        var storedLang = localStorage.getItem('lang');
        document.documentElement.setAttribute('lang', storedLang || 'zh');

        var initHour = new Date().getHours();
        document.documentElement.setAttribute('time-period', window.__getTimePeriod(initHour));
    </script>
    <title>云玩家的想法</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <span class="banner-text" role="heading" aria-level="1"></span>
    </div>

    <div class="center-box">
        <span class="center-text"></span>
    </div>

    <div class="greet-box">
        <span class="greet-text" aria-live="polite"></span>
    </div>

    <div class="join-uid-box">
        <div class="join-text-wrapper">
            <span class="join-text"></span>
        </div>
        <div class="uid-wrapper">
            <div class="uid-content">
                <span class="uid-label"></span>
                <span class="uid-number" id="uidNumber">3706991130184300</span>
            </div>
            <button class="copy-btn" id="copyBtn" aria-label="复制UID"></button>
        </div>
    </div>

    <div class="floating-btn-box">
        <div class="lang-btn-box">
            <button class="lang-btn floating-btn" id="langBtn" aria-label="切换语言"></button>
            <div class="lang-tip floating-btn-tip" aria-hidden="true"></div>
        </div>

        <div class="theme-btn-box">
            <button class="theme-btn floating-btn" id="themeBtn" aria-label="切换深浅模式"></button>
            <div class="theme-tip floating-btn-tip" aria-hidden="true"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
