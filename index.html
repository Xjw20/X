<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云玩家的想法</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome">欢迎访问我的网站</div>
    <div class="main-tip">这只是一个无聊的网站</div>

    <!-- 语言切换 -->
    <div class="lang-btn" id="langBtn">
        <span class="zh">中</span>
        <span class="slash">/</span>
        <span class="en">E</span>
    </div>

    <!-- 深浅模式切换 -->
    <div class="theme-btn" id="themeBtn">
        <div class="sun"></div>
        <div class="moon"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
