<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const isDark = localStorage.getItem('darkMode') === 'true';
        if(isDark) document.documentElement.classList.add('dark');
        const saveLang = localStorage.getItem('lang') || 'zh';
        document.documentElement.setAttribute('lang', saveLang);
        function getTimePeriod() {
            const hour = new Date().getHours();
            if (hour >= 0 && hour < 3) return 'midnight';
            if (hour >= 3 && hour < 6) return 'lateNight';
            if (hour >= 6 && hour < 11) return 'morning';
            if (hour >= 11 && hour < 13) return 'noon';
            if (hour >= 13 && hour < 18) return 'afternoon';
            if (hour >= 18 && hour < 19) return 'evening';
            if (hour >= 19 && hour < 24) return 'night';
            return 'night';
        }
        document.documentElement.setAttribute('time-period', getTimePeriod());
    </script>
    <style>
        :root{background:#fff}
        :root.dark{background:#121212}
    </style>
    <title>我的网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <span class="banner-text"></span>
    </div>

    <div class="center-box">
        <span class="center-text"></span>
    </div>

    <div class="greet-box">
        <span class="greet-text"></span>
    </div>

    <div class="lang-btn-box">
        <button class="lang-btn" id="langBtn"></button>
        <div class="lang-tip"></div>
    </div>

    <div class="theme-btn-box">
        <button class="theme-btn" id="themeBtn"></button>
        <div class="theme-tip"></div>
    </div>

    <!-- 你的专属调试面板 默认隐藏 -->
    <div class="debug-panel" id="debugPanel">
        <h3>你的专属调试功能</h3>
        <p>手动调节小时 (0-23)</p>
        <input type="number" id="hourInput" min="0" max="23" value="12">
        <button id="setHourBtn">确认设置时间</button>
        <button id="resetHourBtn">恢复真实时间</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
