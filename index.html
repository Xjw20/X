<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        window.__getTimePeriod = function(hour) {
            if (hour < 3) return 'midnight';
            if (hour < 6) return 'lateNight';
            if (hour < 11) return 'morning';
            if (hour < 13) return 'noon';
            if (hour < 18) return 'afternoon';
            if (hour < 19) return 'evening';
            return 'night';
        };

        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        var lang = localStorage.getItem('lang') || 'zh';
        document.documentElement.setAttribute('lang', lang);

        var initHour = new Date().getHours();
        document.documentElement.setAttribute('time-period', window.__getTimePeriod(initHour));
    </script>
    <title>云玩家的想法</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-banner">
        <span class="banner-text" role="heading" aria-level="1"></span>
    </div>

    <div class="center-box">
        <span class="center-text"></span>
    </div>

    <div class="greet-box">
        <span class="greet-text" aria-live="polite"></span>
    </div>

    <div class="lang-btn-box">
        <button class="lang-btn" id="langBtn" aria-label="切换语言"></button>
        <div class="lang-tip" aria-hidden="true"></div>
    </div>

    <div class="theme-btn-box">
        <button class="theme-btn" id="themeBtn" aria-label="切换深浅模式"></button>
        <div class="theme-tip" aria-hidden="true"></div>
    </div>

    <div class="debug-panel" id="debugPanel" role="dialog" aria-modal="true" aria-label="调试面板">
        <h3>调试</h3>
        <p>手动调节小时 (0-23)</p>
        <input type="number" id="hourInput" min="0" max="23" value="12" aria-label="小时">
        <button id="setHourBtn">确认设置时间</button>
        <button id="resetHourBtn">恢复真实时间</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
