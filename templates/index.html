<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>云玩家的想法</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <script>
    (function(){
      var saved=localStorage.getItem("theme");
      if(saved==="light"){
        document.body.className="light";
      }else{
        document.body.className="";
      }
    })();
  </script>

  <div class="top-box">欢迎访问我的网站</div>

  <div class="lang-btn" id="langBtn">
    <div class="lang-icon"></div>
    <div class="tip" id="langTip">语言切换</div>
  </div>

  <div class="theme-switch" id="themeSwitch">
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="tip" id="themeTip"></div>
  </div>

  <script src="static/script.js"></script>
</body>
</html>
